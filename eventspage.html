    <link rel="stylesheet" href="eventspage.css">
    <link rel="stylesheet" href="cursor.css">
</head>

<body>

    <!-- Back to Home -->

    <!-- Custom Cursor -->

    <header class="events-header">
        <h1>Events</h1>
    </header>

    <main class="events-grid">
        <!-- CLUBS -->
        <article class="event-card" onclick="window.location.href='clubs.html'">
            <div class="card-illustration club-illustration">
                <svg viewBox="0 0 100 100" class="illustration-svg">
                    <circle cx="50" cy="50" r="30" fill="#A5D0EB" opacity="0.5" />
                    <path d="M35 50L45 60L65 40" stroke="#2E2E2E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <div class="card-content">
                <h2>Clubs</h2>
                <p class="description">Explore various student clubs and their events.</p>
            </div>
            <div class="pin"></div>
        </article>

        <!-- WORKSHOPS -->
        <article class="event-card" onclick="window.location.href='workshops.html'">
            <div class="card-illustration workshop-illustration">
                <svg viewBox="0 0 100 100" class="illustration-svg">
                    <path d="M40 30H60V70H40Z" stroke="#2E2E2E" stroke-width="2" />
                    <circle cx="50" cy="20" r="10" fill="#A5D0EB" opacity="0.6" />
                </svg>
            </div>
            <div class="card-content">
                <h2>Workshops</h2>
                <p class="description">Learn new skills through hands-on sessions.</p>
            </div>
            <div class="pin"></div>
        </article>

        <!-- FESTS -->
        <article class="event-card" onclick="window.location.href='fests.html'">
            <div class="card-illustration fest-illustration">
                <svg viewBox="0 0 100 100" class="illustration-svg">
                    <path d="M50 20L80 70H20L50 20Z" fill="#F3D6C6" opacity="0.7" />
                    <circle cx="50" cy="50" r="10" stroke="#2E2E2E" stroke-width="3" />
                </svg>
            </div>
            <div class="card-content">
                <h2>Fests</h2>
                <p class="description">Join the biggest celebrations on campus.</p>
            </div>
            <div class="pin"></div>
        </article>

        <!-- SPORTS -->
        <article class="event-card" onclick="window.location.href='sports.html'">
            <div class="card-illustration sport-illustration">
                <svg viewBox="0 0 100 100" class="illustration-svg">
                    <circle cx="50" cy="50" r="30" fill="#EDBAA1" opacity="0.5" />
                    <circle cx="50" cy="50" r="25" stroke="#2E2E2E" stroke-width="2" />
                </svg>
            </div>
            <div class="card-content">
                <h2>Sports</h2>
                <p class="description">Inter-hostel matches and tournaments.</p>
            </div>
            <div class="pin"></div>
        </article>
    </main>

    <script src="events_logic.js"></script>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="script.js"></script>
    <script src="cursor.js"></script>
</body>

</html>
